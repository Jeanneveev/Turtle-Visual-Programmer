<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='UTF-8' />
        <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    </head>
    <body>
        <aside class="palette" id="palette">
            <div class="type-blocks">
                <button data-type="move">Move</button>
                <button data-type="turn">Turn</button>
            </div>
            <div class="direction-blocks">
                <button data-direction="up">Up</button>
                <button data-direction="down">Down</button>
                <button data-direction="left">Left</button>
                <button data-direction="right">Right</button>
            </div>
        </aside>
        <main>
            <div id="workspace"></div>
            <button id="add">+</button>
        </main>
        <script type="module" src="main.js"></script>
    </body>
</html>
