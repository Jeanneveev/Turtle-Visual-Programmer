<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='UTF-8' />
        <meta name='viewport' content='width=device-width, initial-scale=1.0' />
        <link rel='stylesheet' href='style.css' />
        <title>Turtle Visual Programmer</title>
    </head>
    <body>
        <aside class="palette" id="palette">
            <div class="type-blocks">
                <button data-type="move">Move</button>
                <button data-type="rotate">Rotate</button>
            </div>
            <div class="direction-blocks">
                <button data-direction="up">Up</button>
                <button data-direction="down">Down</button>
                <button data-direction="left">Left</button>
                <button data-direction="right">Right</button>
            </div>
        </aside>
        <main>
            <div id="workspace" class="workspace"></div>
            <div class="slot_btn_container">
                <button id="add" class="add">+</button>
                <button id="delete" class="delete">-</button>
                <button id="reset" class="reset">R</button>
            </div>
            <button id="submit" class="submit">Submit</button>
        </main>
        <script type="module">
            import { init } from "./main.js";
            init();
        </script>
    </body>
</html>
